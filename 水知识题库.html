                { q: "2025年万元GDP用水量较2020年下降目标？", a: "B", options: ["A.10%", "B.16%", "C.20%", "D.25%"], desc: "十四五规划目标下降16%。" },
                { q: "下列属于非常规水资源的是？", a: "A", options: ["A.再生水", "B.河湖水", "C.地下水", "D.饮用水"], desc: "再生水、雨水、海水均属非常规水资源。" },

                { q: "哪种行为会导致地下水咸化？", a: "C", options: ["A.雨水入渗", "B.农田灌溉", "C.海水倒灌", "D.污水排放"], desc: "海水入侵地下水会造成水质咸化。" }

                { q: "我国水资源时空分布特点是？", a: "A", options: ["A.南多北少、东多西少，夏秋多、冬春少", "B.南少北多、东少西多，夏秋多、冬春少", "C.南多北少、东多西少，夏秋少、冬春多", "D.南少北多、东少西多，夏秋少、冬春多"], desc: "我国水资源总体南多北少、夏秋集中。" },
                { q: "节水型用水器具适用标识是？", a: "C", options: ["A.能源效率标识", "B.环保标识", "C.水效标识", "D.质量标识"], desc: "我国用水器具实行水效标识制度。" },
                { q: "属于突发性水污染事故的是？", a: "B", options: ["A.农业面源污染", "B.化工厂废水泄漏", "C.生活污水排放", "D.水土流失"], desc: "企业泄漏属于突然发生的污染事件。" },
                { q: "我国最大淡水湖是？", a: "A", options: ["A.鄱阳湖", "B.洞庭湖", "C.太湖", "D.洪泽湖"], desc: "江西鄱阳湖是中国第一大淡水湖。" },
                { q: "节水型淋浴器流量限值为多少升/分钟？", a: "D", options: ["A.5", "B.6", "C.7", "D.8"], desc: "节水淋浴器流量≤8L/min。" },
                { q: "去除水中重金属离子常用工艺？", a: "C", options: ["A.沉淀", "B.过滤", "C.离子交换", "D.消毒"], desc: "离子交换可高效去除重金属离子。" },
                { q: "世界水资源最丰富的国家是？", a: "B", options: ["A.中国", "B.巴西", "C.俄罗斯", "D.加拿大"], desc: "巴西水资源总量位居世界第一。" },
                { q: "雨污分流核心目的是？", a: "A", options: ["A.减少污水厂负荷，防止初期雨水污染", "B.降低成本", "C.提高排水速度", "D.便于维护"], desc: "分流制可大幅提升污水处理效率、减少污染。" },
                { q: "水资源管理三条红线不包括？", a: "D", options: ["A.开发利用控制红线", "B.用水效率控制红线", "C.水功能区限制纳污红线", "D.水资源保护面积红线"], desc: "三条红线：用水总量、效率、纳污上限。" }
            ],
            // 第9组
            [
                { q: "岩溶水储存于哪种地层？", a: "C", options: ["A.砂土层", "B.黏土层", "C.碳酸盐岩地层", "D.花岗岩地层"], desc: "岩溶水存在于石灰岩、白云岩等碳酸盐岩地层。" },
                { q: "小浪底水利枢纽位于哪条河流？", a: "B", options: ["A.长江", "B.黄河", "C.淮河", "D.海河"], desc: "小浪底是黄河流域关键水利工程。" },
                { q: "下列不属于水中重金属污染物的是？", a: "A", options: ["A.钠", "B.汞", "C.镉", "D.铅"], desc: "钠是常量元素，不属于重金属污染物。" },
                { q: "规模以上工业企业用水重复利用率不低于？", a: "C", options: ["A.70%", "B.75%", "C.80%", "D.85%"], desc: "国家考核标准≥80%。" },
                { q: "雨水利用潜力与城市什么最相关？", a: "B", options: ["A.人口数量", "B.降雨总量与分布", "C.面积大小", "D.工业规模"], desc: "降雨量直接决定雨水可利用量。" },
                { q: "总氮(TN)是衡量水体什么的指标？", a: "A", options: ["A.富营养化", "B.重金属污染", "C.有机物污染", "D.酸碱程度"], desc: "总氮、总磷是富营养化核心指标。" },
                { q: "我国第一部水资源保护法规是？", a: "C", options: ["A.环境保护法", "B.水污染防治法", "C.水法", "D.水土保持法"], desc: "《水法》是我国水资源管理基本法。" },
                { q: "下列属于工程节水灌溉的是？", a: "B", options: ["A.秸秆覆盖", "B.防渗渠道", "C.测土配方施肥", "D.轮作休耕"], desc: "防渗渠道减少渗漏，属于工程节水。" },
                { q: "节水型城市再生水利用率不低于？", a: "D", options: ["A.15%", "B.20%", "C.25%", "D.30%"], desc: "国标要求再生水利用率≥30%。" },
                { q: "哪种自然因素加剧水资源短缺？", a: "A", options: ["A.全球气候变暖", "B.台风", "C.暴雨", "D.寒潮"], desc: "气候变暖导致蒸发加剧、干旱频发。" }
            ],
            // 第10组
            [
                { q: "MBR膜生物反应器结合了什么与膜过滤？", a: "C", options: ["A.活性污泥法", "B.生物膜法", "C.以上都是", "D.以上都不是"], desc: "MBR是生物处理+膜分离的组合工艺。" },
                { q: "南水北调工程供水目标不包括？", a: "D", options: ["A.华北地区", "B.黄淮海流域", "C.胶东地区", "D.西北地区"], desc: "南水北调主要服务华北、黄淮海地区。" },
                { q: "饮用水中硝酸盐限值为多少mg/L？", a: "B", options: ["A.5", "B.10", "C.20", "D.30"], desc: "国标GB5749-2022规定硝酸盐≤10mg/L。" },
                { q: "水资源可持续利用核心是不损害？", a: "C", options: ["A.上一代人", "B.同一代人", "C.后代人", "D.其他国家"], desc: "可持续发展核心是代际公平。" },
                { q: "城市用水效率最高的类型是？", a: "A", options: ["A.工业用水", "B.居民生活用水", "C.农业用水", "D.绿化用水"], desc: "工业用水重复利用率最高，效率最优。" },
                { q: "水体黑臭主要原因是水中什么含量过高？", a: "D", options: ["A.硝酸盐", "B.磷酸盐", "C.重金属", "D.有机污染物"], desc: "有机物分解耗尽溶解氧，导致水体发黑发臭。" },
                { q: "我国水功能区分为几类？", a: "C", options: ["A.5", "B.6", "C.7", "D.8"], desc: "共分为7类水功能区。" },
                { q: "世界上第一个提出水安全概念的国家是？", a: "B", options: ["A.中国", "B.荷兰", "C.美国", "D.澳大利亚"], desc: "荷兰最早提出水安全国家战略。" },
                { q: "节水型洁具水效检测依据是？", a: "A", options: ["A.《卫生陶瓷》国家标准", "B.节水型产品技术要求", "C.生活饮用水标准", "D.污水排放标准"], desc: "依据GB/T 6952《卫生陶瓷》。" },
                { q: "我国护水节水基本国策是？", a: "C", options: ["A.节约用水、防治水污染", "B.保护水资源、合理开发", "C.节约用水、保护水资源", "D.合理开发、永续利用"], desc: "我国基本国策：节约用水、保护水资源。" }
            ]
        ];

        let currentQuestions = [];
        let userAnswers = [];

        // 抽签随机抽一组
        document.getElementById('drawBtn').onclick = function () {
            const randomIndex = Math.floor(Math.random() * questionBank.length);
            currentQuestions = questionBank[randomIndex];
            renderQuiz();
            document.getElementById('drawBtn').style.display = 'none';
            document.getElementById('quizArea').style.display = 'block';
        };

        // 渲染题目
        function renderQuiz() {
            const container = document.getElementById('quizContainer');
            container.innerHTML = '';
            currentQuestions.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'question';
                let html = `<div class="question-text">${index + 1}. ${item.q}</div><div class="options">`;
                item.options.forEach(opt => {
                    html += `<div class="option"><label><input type="radio" name="q${index}" value="${opt.charAt(0)}"> ${opt}</label></div>`;
                });
                html += `</div>`;
                div.innerHTML = html;
                container.appendChild(div);
            });
        }

        // 提交判分
        document.getElementById('submitBtn').onclick = function () {
            userAnswers = [];
            let score = 0;
            currentQuestions.forEach((item, index) => {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                const ans = selected ? selected.value : '';
                userAnswers.push(ans);
                if (ans === item.a) score += 10;
            });

            // 显示结果
            document.getElementById('quizArea').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('scoreText').innerText = `你的得分：${score} 分（满分100分）`;

            // 显示解析
            let analysisHtml = '';
            currentQuestions.forEach((item, index) => {
                const ua = userAnswers[index] || '未作答';
                const isCorrect = ua === item.a;
                analysisHtml += `
                <div class="item">
                    <div>${index + 1}. ${item.q}</div>
                    <div>你的答案：${ua} 正确答案：${item.a}</div>
                    <div style="color:${isCorrect?'#009900':'#cc0000'}">${isCorrect?'✔ 正确':'✘ 错误'} | 解析：${item.desc}</div>
                </div>`;
            });
            document.getElementById('analysis').innerHTML = analysisHtml;
        };
    </script>
</body>
